<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Avvio Palestra App...</title>
    <style>
      body {
        background-color: #1a1a1a;
        color: #ffffff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .spinner {
        margin-top: 20px;
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #00e676;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h2 {
        font-weight: 300;
        margin-top: 30px;
      }
      p {
        color: #a0a0a0;
        font-size: 0.9em;
        text-align: center;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <img
      src="icon.png"
      alt="Logo"
      style="width: 100px; height: 100px; object-fit: contain"
    />
    <div class="spinner"></div>
    <h2>Stiamo configurando l'ambiente...</h2>
    <p>
      L'intelligenza artificiale per il riconoscimento sta scaldando i motori.
      Il processo richiede fino a un paio di minuti.
    </p>
  </body>
</html>

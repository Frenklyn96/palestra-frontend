name: Build and Release Electron App

on:
  push:
    tags:
      - "v*.*.*" # Es. push di un tag v1.0.0
  workflow_dispatch: # Permette di lanciarla manualmente dal sito GitHub

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: palestra-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "palestra-frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build:win -- -p always

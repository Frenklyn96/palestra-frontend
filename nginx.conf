server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        # se hai un backend api proxato, configuralo qui
        # proxy_pass http://backend:porta;
    }

    error_page 404 /index.html;
}
